            // ===== Event Listeners =====
            setupFlashcardEventListeners() {
                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (!this.isQuizActive || this.isProcessing) return;

                    const isMemorize = (this.quizMode === 'notMemorized' && this.notMemorizedMode === 'memorize');

                    if (isMemorize) {
                        if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            e.preventDefault();
                            this.revealMemorizeCard();
                        }
                    } else {
                        if (e.key === 'ArrowLeft') {
                            e.preventDefault();
                            this.selectChoice(0);
                        } else if (e.key === 'ArrowRight') {
                            e.preventDefault();
                            this.selectChoice(1);
                        }
                    }
                });

                // Click outside sidebar to close
                document.getElementById('sidebarOverlay').addEventListener('click', (e) => {
                    if (e.target.id === 'sidebarOverlay') {
                        this.toggleSidebar();
                    }
                });

                // Prevent sidebar panel clicks from closing
                document.getElementById('sidebarPanel').addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }

            // ===== Data Loading =====
            parseMindmapData(content) {
                const lines = content.trim().split('\n').filter(line => line.trim());
                const title = this.currentTitle || '마인드맵';

                const mindmapData = {
                    title: title,
                    branches: []
                };

                lines.forEach(line => {
                    const parts = line.split('@');
                    const branch = {
                        level1: parts[0] ? parts[0].trim() : '',
                        level2: parts[1] ? parts[1].trim() : '',
                        level3: parts[2] ? parts[2].trim() : ''
                    };

                    if (branch.level1) {
                        mindmapData.branches.push(branch);
                    }
                });

                return mindmapData;
            }

            async loadData() {
                if (!this.db) return;

                try {
                    await new Promise((resolve, reject) => {
                        const transaction = this.db.transaction(['contents'], 'readonly');
                        const store = transaction.objectStore('contents');
                        const request = store.getAll();

                        request.onsuccess = async () => {
                            const currentPath = this.detectUrlPath();
                            this.savedTexts = request.result
                                .filter(item => item.url_path === currentPath)
                                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                            await this.renderSavedTexts();
                            resolve();
                        };
                        request.onerror = () => reject(request.error);
                    });
                } catch (error) {
                    console.error('데이터 로드 오류:', error);
                }
            }

            async renderSavedTexts() {
                const container = document.getElementById('savedTextsList');
                const countElement = document.getElementById('savedTexts');

                countElement.textContent = this.savedTexts.length;

                if (this.savedTexts.length === 0) {
                    container.innerHTML = '<div class="flashcard-idle" style="padding:20px;font-size:13px;">저장된 콘텐츠가 없습니다</div>';
                    return;
                }

                container.innerHTML = '';

                for (let i = 0; i < this.savedTexts.length; i++) {
                    const item = this.savedTexts[i];
                    const listItem = document.createElement('div');
                    listItem.className = 'sidebar-item';
                    listItem.setAttribute('data-id', item.id);
                    if (this.currentTextId === item.id) {
                        listItem.classList.add('active');
                    }

                    const typeIcon = item.content_type === 'image' ? '🖼️' : (item.content_type === 'mindmap' ? '🧠' : '📝');

                    // Get word progress counts for mindmap items
                    let badgeHtml = '';
                    if (item.content_type === 'mindmap') {
                        try {
                            const counts = await this.getWordCounts(item.id);
                            const total = counts.remaining + counts.notMemorized + counts.memorized;
                            if (total > 0) {
                                badgeHtml = '<span class="sidebar-badge">' + total + '단어</span>';
                                if (counts.memorized > 0) {
                                    badgeHtml += '<span class="sidebar-badge" style="background:#2e7d32">' + counts.memorized + '암기</span>';
                                }
                            }
                        } catch (e) {}
                    }

                    listItem.innerHTML =
                        '<div class="sidebar-item-title">' + typeIcon + ' ' + item.title + '</div>' +
                        '<div class="sidebar-item-actions">' +
                            badgeHtml +
                            '<button class="sidebar-delete-btn" onclick="event.stopPropagation(); window.app && window.app.deleteContent(' + item.id + ')" title="삭제">🗑️</button>' +
                        '</div>';

                    listItem.addEventListener('click', (e) => {
                        if (e.target.closest('.sidebar-delete-btn')) return;
                        this.loadContent(item);
                        this.toggleSidebar();
                    });

                    container.appendChild(listItem);
                }
            }

            async getHighlightStats(contentId) {
                if (!this.db) return { total: 0, priority: 0, wordCount: 0 };

                return new Promise((resolve) => {
                    const transaction = this.db.transaction(['highlights', 'contents'], 'readonly');
                    const highlightStore = transaction.objectStore('highlights');
                    const highlightIndex = highlightStore.index('content_id');

                    const contentStore = transaction.objectStore('contents');
                    const contentRequest = contentStore.get(parseInt(contentId));

                    let wordCount = 0;
                    let highlightResult = null;
                    let contentDone = false;
                    let highlightDone = false;

                    const tryResolve = () => {
                        if (contentDone && highlightDone) {
                            const total = highlightResult ? highlightResult.length : 0;
                            const priority = highlightResult ? highlightResult.filter(h => h.is_priority).length : 0;
                            resolve({ total, priority, wordCount });
                        }
                    };

                    contentRequest.onsuccess = () => {
                        const item = contentRequest.result;
                        if (item && item.content_type === 'mindmap') {
                            try {
                                const mindmapData = item.mindmap_data ? JSON.parse(item.mindmap_data) : null;
                                if (mindmapData && mindmapData.branches) {
                                    wordCount = mindmapData.branches.filter(b => b.level1).length;
                                }
                            } catch (e) {}
                        }
                        contentDone = true;
                        tryResolve();
                    };

                    const request = highlightIndex.getAll(contentId);
                    request.onsuccess = () => {
                        highlightResult = request.result;
                        highlightDone = true;
                        tryResolve();
                    };
                    request.onerror = () => {
                        highlightResult = [];
                        highlightDone = true;
                        tryResolve();
                    };
                });
            }

            // ===== Delete Content =====
            async deleteContent(contentId) {
                const content = this.savedTexts.find(item => item.id === contentId);
                if (!content) return;

                const confirmed = await this.showConfirmDialog(
                    '콘텐츠 삭제',
                    '"' + content.title + '" 콘텐츠를 삭제하시겠습니까?'
                );

                if (!confirmed) return;

                try {
                    // Delete word_progress records
                    const wpTx = this.db.transaction(['word_progress'], 'readwrite');
                    const wpStore = wpTx.objectStore('word_progress');
                    const wpIdx = wpStore.index('content_id');
                    const wpReq = wpIdx.getAll(contentId);
                    wpReq.onsuccess = () => {
                        const records = wpReq.result;
                        records.forEach(r => wpStore.delete(r.id));
                    };

                    const transaction = this.db.transaction(['contents', 'highlights'], 'readwrite');
                    const contentStore = transaction.objectStore('contents');
                    const highlightStore = transaction.objectStore('highlights');
                    const highlightIndex = highlightStore.index('content_id');

                    const highlightRequest = highlightIndex.getAll(contentId);
                    highlightRequest.onsuccess = () => {
                        const highlights = highlightRequest.result;
                        highlights.forEach(highlight => highlightStore.delete(highlight.id));
                    };

                    contentStore.delete(contentId);

                    transaction.oncomplete = () => {
                        if (this.currentTextId === contentId) {
                            this.currentTextId = null;
                            this.currentTitle = '';
                            this.currentText = '';
                            this.currentContentType = 'text';
                            this.currentImageData = null;
                            this.currentMindmapData = null;
                            this.isQuizActive = false;
                            this.stopQuizTimer();

                            document.getElementById('topTitle').textContent = '콘텐츠를 선택하세요';
                            document.getElementById('flashcardArea').innerHTML =
                                '<div class="flashcard-idle" id="flashcardIdle">' +
                                    '<div class="flashcard-idle-icon">📚</div>' +
                                    '<div>위의 박스를 터치하여 학습을 시작하세요</div>' +
                                '</div>';
                            document.getElementById('choiceArea').style.display = 'none';
                            document.getElementById('timerBarContainer').style.display = 'none';
                            this.updateStatBar();
                            localStorage.removeItem('lastViewedContentId');
                        }

                        this.loadData();
                        this.showToast('콘텐츠가 삭제되었습니다');
                    };

                } catch (error) {
                    console.error('콘텐츠 삭제 오류:', error);
                    this.showToast('콘텐츠 삭제에 실패했습니다', 'error');
                }
            }

            // ===== URL / Category Detection =====
            detectUrlPath() {
                const params = new URLSearchParams(window.location.search);
                const pageParam = params.get('page');
                if (pageParam) return pageParam;

                try {
                    if (window.parent !== window) {
                        const parentSegments = window.parent.location.pathname.split('/').filter(s => s.length > 0);
                        if (parentSegments.length > 0) return parentSegments[parentSegments.length - 1];
                    }
                } catch (e) {}

                const pathSegments = window.location.pathname.split('/').filter(s => s.length > 0);
                if (pathSegments.length > 0) {
                    const lastSegment = pathSegments[pathSegments.length - 1];
                    if (!lastSegment.includes('.') || lastSegment.endsWith('.html') || lastSegment.endsWith('.htm')) {
                        return lastSegment.replace(/\.(html|htm)$/, '');
                    }
                }

                return window.location.hostname || 'default';
            }

            async loadPageCategory() {
                try {
                    const urlPath = this.detectUrlPath();
                    if (!urlPath) {
                        this.pageCategory = null;
                        return;
                    }

                    const response = await fetch(this.proxyUrl + '/page_config', { cache: 'no-store' });

                    if (!response.ok) {
                        this.pageCategory = null;
                        return;
                    }

                    const data = await response.json();
                    const match = data.records.find(r => r.fields.url_path === urlPath);

                    if (match) {
                        this.pageCategory = {
                            category1: match.fields.category1 || '',
                            category2: match.fields.category2 || '',
                            category3: match.fields.category3 || ''
                        };
                    } else {
                        this.pageCategory = null;
                    }
                } catch (error) {
                    console.error('페이지 카테고리 로딩 오류:', error);
                    this.pageCategory = null;
                }
            }

            // ===== Airtable Import =====
            async importFromAirtable() {
                try {
                    this.showToast('자료에서 데이터를 가져오는 중...', 'info');

                    let response;
                    try {
                        response = await fetch(this.proxyUrl, { cache: 'no-store' });
                    } catch (fetchError) {
                        this.showToast('자료 연결에 실패했습니다.', 'error');
                        return;
                    }

                    if (!response.ok) {
                        this.showToast('자료 접근 실패: ' + response.status, 'error');
                        return;
                    }

                    const data = await response.json();

                    if (!data.records || data.records.length === 0) {
                        this.showToast('가져올 데이터가 없습니다', 'info');
                        return;
                    }

                    if (this.pageCategory === null) {
                        this.showToast('이 페이지에 설정된 콘텐츠가 없습니다', 'info');
                        return;
                    }

                    const filtered = data.records.filter(record => {
                        const f = record.fields;
                        return (!this.pageCategory.category1 || (f.category1 || '') === this.pageCategory.category1)
                            && (!this.pageCategory.category2 || (f.category2 || '') === this.pageCategory.category2)
                            && (!this.pageCategory.category3 || (f.category3 || '') === this.pageCategory.category3);
                    });

                    if (filtered.length === 0) {
                        this.showToast('해당 카테고리의 콘텐츠가 없습니다', 'info');
                        return;
                    }

                    await this.showAirtableImportDialog(filtered);

                } catch (error) {
                    console.error('자료 불러오기 오류:', error);
                    this.showToast('자료 불러오기 중 오류가 발생했습니다', 'error');
                }
            }

            parseVersionedTitle(title) {
                const match = title.match(/^(.+?)(\d+(?:\.\d+)?)$/);
                if (match) {
                    return { baseName: match[1].trimEnd(), version: parseFloat(match[2]) };
                }
                return { baseName: title.trimEnd(), version: 0 };
            }

            selectUpdateItems() {
                if (!this.airtableImportItems) return;
                this.airtableImportItems.forEach(item => {
                    item.selected = !!item.isUpdate;
                });
                this.refreshAirtableList();
                this.updateSelectedCount();
            }

            async showAirtableImportDialog(records) {
                try {
                    const allLocalContents = await new Promise((resolve, reject) => {
                        const tx = this.db.transaction(['contents'], 'readonly');
                        const st = tx.objectStore('contents');
                        const req = st.getAll();
                        req.onsuccess = () => resolve(req.result || []);
                        req.onerror = () => reject(req.error);
                    });

                    const localVersionMap = new Map();
                    allLocalContents.forEach(item => {
                        const { baseName, version } = this.parseVersionedTitle(item.title);
                        const existing = localVersionMap.get(baseName);
                        if (!existing || version > existing.version) {
                            localVersionMap.set(baseName, { version, contentId: item.id, title: item.title });
                        }
                    });

                    const localTitles = new Set(allLocalContents.map(item => item.title));
                    const airtableItems = [];

                    records.forEach((record) => {
                        try {
                            const fields = record.fields;
                            const jsonData = fields.json;
                            if (!jsonData) return;

                            let item;
                            try {
                                item = JSON.parse(jsonData);
                            } catch (parseError) {
                                const lastBraceIndex = jsonData.lastIndexOf('}');
                                if (lastBraceIndex > 0) {
                                    item = JSON.parse(jsonData.substring(0, lastBraceIndex + 1));
                                } else {
                                    return;
                                }
                            }

                            if (!item || !item.content) return;

                            const title = item.content.title || '제목 없음';
                            const contentType = item.content.content_type || 'text';
                            let wordCount = 0;
                            if (contentType === 'mindmap') {
                                try {
                                    const md = item.content.mindmap_data ? JSON.parse(item.content.mindmap_data) : null;
                                    if (md && md.branches) wordCount = md.branches.filter(b => b.level1).length;
                                } catch (e) {}
                            }

                            const { baseName: airBase, version: airVer } = this.parseVersionedTitle(title);
                            const localEntry = localVersionMap.get(airBase);
                            let isDuplicate = false;
                            let isUpdate = false;
                            let updateTargetId = null;

                            if (localTitles.has(title)) {
                                isDuplicate = true;
                            } else if (localEntry && airVer > localEntry.version) {
                                isUpdate = true;
                                updateTargetId = localEntry.contentId;
                            }

                            if (!isUpdate && !isDuplicate) {
                                for (const localItem of allLocalContents) {
                                    if (title === localItem.title) continue;
                                    if (title.startsWith(localItem.title)) {
                                        const suffix = title.substring(localItem.title.length).trim();
                                        if (/^\d+(\.\d+)?$/.test(suffix)) {
                                            isUpdate = true;
                                            updateTargetId = localItem.id;
                                            break;
                                        }
                                    }
                                    if (localItem.title.startsWith(airBase)) {
                                        const localSuffix = localItem.title.substring(airBase.length).trim();
                                        if (localSuffix === '' || /^\d+(\.\d+)?$/.test(localSuffix)) {
                                            const localVer = localSuffix === '' ? 0 : parseFloat(localSuffix);
                                            if (airVer > localVer) {
                                                isUpdate = true;
                                                updateTargetId = localItem.id;
                                                break;
                                            }
                                        }
                                    }
                                }
                            }

                            airtableItems.push({
                                record: record,
                                item: item,
                                title: title,
                                contentType: contentType,
                                wordCount: wordCount,
                                isDuplicate: isDuplicate,
                                isUpdate: isUpdate,
                                updateTargetId: updateTargetId,
                                selected: !isDuplicate || isUpdate
                            });

                        } catch (error) {
                            console.error('레코드 파싱 오류:', error);
                        }
                    });

                    if (airtableItems.length === 0) {
                        this.showToast('가져올 수 있는 유효한 데이터가 없습니다', 'error');
                        return;
                    }

                    const existingModal = document.querySelector('.airtable-import-modal');
                    if (existingModal) existingModal.remove();

                    const modal = document.createElement('div');
                    modal.className = 'airtable-import-modal';

                    const duplicateCount = airtableItems.filter(item => item.isDuplicate && !item.isUpdate).length;
                    const updateCount = airtableItems.filter(item => item.isUpdate).length;
                    const newCount = airtableItems.length - duplicateCount - updateCount;

                    modal.innerHTML = `
                        <div class="airtable-import-dialog">
                            <div class="airtable-import-header">
                                <div class="airtable-import-title">자료에서 불러오기</div>
                                <div class="airtable-import-subtitle">
                                    총 ${airtableItems.length}개 항목 (신규: ${newCount}개, 업데이트: ${updateCount}개, 중복: ${duplicateCount}개)
                                </div>
                            </div>
                            <div class="airtable-import-controls">
                                <button class="btn btn-secondary btn-small" id="selectAllBtn">전체 선택</button>
                                <button class="btn btn-secondary btn-small" id="selectNoneBtn">전체 해제</button>
                                <button class="btn btn-info btn-small" id="selectNewBtn">중복 제외 선택</button>
                                <button class="btn btn-primary btn-small" id="selectDuplicateBtn">중복 항목만 선택</button>
                                ${updateCount > 0 ? '<button class="btn btn-small" id="selectUpdateBtn" style="background:#4caf50;color:#fff;">업데이트 항목만 선택</button>' : ''}
                            </div>
                            <div class="airtable-import-list" id="airtableImportList">
                                ${this.renderAirtableItems(airtableItems)}
                            </div>
                            <div class="airtable-import-actions">
                                <div class="airtable-import-summary"><span id="selectedCount">0</span>개 항목 선택됨</div>
                                <div class="airtable-import-buttons">
                                    <button class="btn btn-secondary" id="cancelBtn">취소</button>
                                    <button class="btn btn-primary" id="importBtn">선택한 항목 불러오기</button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.body.appendChild(modal);
                    this.airtableImportItems = airtableItems;
                    this.updateSelectedCount();

                    modal.querySelector('#selectAllBtn').addEventListener('click', () => this.selectAllAirtableItems(true));
                    modal.querySelector('#selectNoneBtn').addEventListener('click', () => this.selectAllAirtableItems(false));
                    modal.querySelector('#selectNewBtn').addEventListener('click', () => this.selectNonDuplicateItems());
                    modal.querySelector('#selectDuplicateBtn').addEventListener('click', () => this.selectDuplicateItems());
                    const selectUpdateBtn = modal.querySelector('#selectUpdateBtn');
                    if (selectUpdateBtn) selectUpdateBtn.addEventListener('click', () => this.selectUpdateItems());
                    modal.querySelector('#cancelBtn').addEventListener('click', () => this.closeAirtableImportDialog());
                    modal.querySelector('#importBtn').addEventListener('click', () => this.importSelectedItems());
                    modal.addEventListener('click', (e) => { if (e.target === modal) this.closeAirtableImportDialog(); });

                } catch (error) {
                    console.error('다이얼로그 표시 오류:', error);
                    this.showToast('다이얼로그 표시에 실패했습니다', 'error');
                }
            }

            renderAirtableItems(items) {
                return items.map((item, index) => {
                    const typeIcon = item.contentType === 'image' ? '🖼️' : (item.contentType === 'mindmap' ? '🧠' : '📝');
                    let statusClass = '';
                    let statusTag = '';
                    if (item.isUpdate) {
                        statusClass = 'update';
                        statusTag = '<span class="airtable-import-tag update-tag">업데이트</span>';
                    } else if (item.isDuplicate) {
                        statusClass = 'duplicate';
                        statusTag = '<span class="airtable-import-tag">중복</span>';
                    }

                    return `
                        <div class="airtable-import-item ${statusClass}">
                            <input type="checkbox" class="airtable-import-checkbox"
                                   ${item.selected ? 'checked' : ''}
                                   onchange="window.app.toggleAirtableItem(${index}, this.checked)">
                            <div class="airtable-import-info">
                                <div class="airtable-import-item-title">${typeIcon} ${item.title}</div>
                                <div class="airtable-import-item-details">
                                    <span>${item.contentType === 'mindmap' ? '암기할 갯수: ' + item.wordCount + '개' : ''}</span>
                                    <span>타입: ${item.contentType}</span>
                                    ${statusTag}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            selectAllAirtableItems(selected) {
                if (!this.airtableImportItems) return;
                this.airtableImportItems.forEach(item => { item.selected = selected; });
                this.refreshAirtableList();
                this.updateSelectedCount();
            }

            selectNonDuplicateItems() {
                if (!this.airtableImportItems) return;
                this.airtableImportItems.forEach(item => { item.selected = !item.isDuplicate; });
                this.refreshAirtableList();
                this.updateSelectedCount();
            }

            selectDuplicateItems() {
                if (!this.airtableImportItems) return;
                this.airtableImportItems.forEach(item => { item.selected = item.isDuplicate; });
                this.refreshAirtableList();
                this.updateSelectedCount();
            }

            toggleAirtableItem(index, selected) {
                if (!this.airtableImportItems || !this.airtableImportItems[index]) return;
                this.airtableImportItems[index].selected = selected;
                this.updateSelectedCount();
            }

            refreshAirtableList() {
                const listContainer = document.getElementById('airtableImportList');
                if (listContainer && this.airtableImportItems) {
                    listContainer.innerHTML = this.renderAirtableItems(this.airtableImportItems);
                }
            }

            updateSelectedCount() {
                const countElement = document.getElementById('selectedCount');
                if (countElement && this.airtableImportItems) {
                    countElement.textContent = this.airtableImportItems.filter(item => item.selected).length;
                }
            }

            closeAirtableImportDialog() {
                const modal = document.querySelector('.airtable-import-modal');
                if (modal) modal.remove();
                this.airtableImportItems = null;
            }

            async importSelectedItems() {
                if (!this.airtableImportItems) return;

                const selectedItems = this.airtableImportItems.filter(item => item.selected);
                if (selectedItems.length === 0) {
                    this.showToast('선택된 항목이 없습니다', 'error');
                    return;
                }

                this.closeAirtableImportDialog();
                this.showToast(`${selectedItems.length}개 항목 불러오기 시작...`, 'info');

                try {
                    const importData = { contents: [], highlights: [], updateMap: [] };

                    selectedItems.forEach(airtableItem => {
                        const item = airtableItem.item;
                        const fields = airtableItem.record.fields;

                        const imageFields = [];
                        for (let i = 1; i <= 25; i++) {
                            const imageField = fields[`image${i}`];
                            imageFields.push(imageField && imageField.trim() ? imageField : '');
                        }

                        if (imageFields.some(field => field)) {
                            const combinedImage = this.combineImageData(imageFields);
                            if (combinedImage.trim()) {
                                item.content.image_data = combinedImage;
                            }
                        }

                        const contentFields = [];
                        for (let i = 1; i <= 7; i++) {
                            const cf = fields[`content${i}`];
                            contentFields.push(cf && cf.trim() ? cf : '');
                        }
                        if (contentFields.some(f => f)) {
                            item.content.content = contentFields.filter(f => f).join('');
                        }

                        if (item.content.content_type === 'mindmap' && item.content.content) {
                            const lines = item.content.content.trim().split('\n').filter(l => l.trim());
                            const branches = [];
                            lines.forEach(line => {
                                const parts = line.split('@');
                                const branch = { level1: (parts[0]||'').trim(), level2: (parts[1]||'').trim(), level3: (parts[2]||'').trim() };
                                if (branch.level1) branches.push(branch);
                            });
                            item.content.mindmap_data = JSON.stringify({ title: item.content.title || '마인드맵', branches: branches });
                        }
                        importData.contents.push(item.content);
                        importData.updateMap.push({
                            isUpdate: !!airtableItem.isUpdate,
                            updateTargetId: airtableItem.updateTargetId || null
                        });
                    });

                    await this.importAllDataBatch(importData);

                } catch (error) {
                    console.error('선택 항목 불러오기 오류:', error);
                    this.showToast('선택한 항목 불러오기에 실패했습니다', 'error');
                }
            }

            async getUniqueTitle(baseTitle) {
                const transaction = this.db.transaction(['contents'], 'readonly');
                const store = transaction.objectStore('contents');
                const index = store.index('title');

                return new Promise((resolve) => {
                    const request = index.getAll();
                    request.onsuccess = () => {
                        const existingTitles = request.result.map(item => item.title);
                        let finalTitle = baseTitle;
                        let counter = 1;
                        while (existingTitles.includes(finalTitle)) {
                            finalTitle = baseTitle + ' (' + counter + ')';
                            counter++;
                        }
                        resolve(finalTitle);
                    };
                });
            }

            async importAllDataBatch(data) {
                try {
                    let importedCount = 0;
                    let updatedCount = 0;
                    const contentIdMap = new Map();
                    const updateMap = data.updateMap || [];

                    for (let i = 0; i < data.contents.length; i++) {
                        const content = data.contents[i];
                        const updateInfo = updateMap[i] || { isUpdate: false, updateTargetId: null };

                        try {
                            if (updateInfo.isUpdate && updateInfo.updateTargetId) {
                                const targetId = updateInfo.updateTargetId;

                                const existing = await new Promise((resolve, reject) => {
                                    const tx = this.db.transaction(['contents'], 'readonly');
                                    const st = tx.objectStore('contents');
                                    const req = st.get(targetId);
                                    req.onsuccess = () => resolve(req.result);
                                    req.onerror = () => reject(req.error);
                                });

                                if (!existing) {
                                    await this._addNewContent(content, contentIdMap);
                                    importedCount++;
                                    continue;
                                }

                                const updatedContent = {
                                    ...existing,
                                    title: content.title,
                                    content: content.content,
                                    content_type: content.content_type,
                                    mindmap_data: content.mindmap_data || existing.mindmap_data,
                                    image_data: content.image_data || existing.image_data,
                                    category1: content.category1 || existing.category1,
                                    category2: content.category2 || existing.category2,
                                    category3: content.category3 || existing.category3,
                                    updated_at: new Date()
                                };
                                updatedContent.id = existing.id;

                                await new Promise((resolve, reject) => {
                                    const tx = this.db.transaction(['contents'], 'readwrite');
                                    const st = tx.objectStore('contents');
                                    st.put(updatedContent);
                                    tx.oncomplete = () => { updatedCount++; resolve(); };
                                    tx.onerror = () => reject(tx.error);
                                });

                            } else {
                                await this._addNewContent(content, contentIdMap);
                                importedCount++;
                            }
                        } catch (error) {
                            console.error('콘텐츠 저장 오류:', error);
                        }
                    }

                    if (data.highlights && Array.isArray(data.highlights)) {
                        const validHighlights = data.highlights.filter(highlight => contentIdMap.has(highlight.content_id));
                        for (const highlight of validHighlights) {
                            try {
                                const newContentId = contentIdMap.get(highlight.content_id);
                                delete highlight.id;
                                highlight.content_id = newContentId;
                                highlight.imported_at = new Date();
                                highlight.is_priority = false;

                                await new Promise((resolve, reject) => {
                                    const tx = this.db.transaction(['highlights'], 'readwrite');
                                    const store = tx.objectStore('highlights');
                                    const request = store.add(highlight);
                                    request.onsuccess = () => resolve();
                                    request.onerror = () => reject(request.error);
                                });
                            } catch (error) {
                                console.error('하이라이트 저장 오류:', error);
                            }
                        }
                    }

                    await this.loadData();

                    if (updatedCount > 0 && this.currentTextId) {
                        try {
                            const tx = this.db.transaction(['contents'], 'readonly');
                            const st = tx.objectStore('contents');
                            const req = st.get(this.currentTextId);
                            req.onsuccess = () => {
                                const updatedItem = req.result;
                                if (updatedItem) this.loadContent(updatedItem);
                            };
                        } catch (e) {}
                    } else if (importedCount > 0 && this.savedTexts.length > 0 && !this.currentTextId) {
                        this.loadContent(this.savedTexts[0]);
                    }

                    let msg = '';
                    if (importedCount > 0 && updatedCount > 0) {
                        msg = importedCount + '개 신규, ' + updatedCount + '개 업데이트 완료';
                    } else if (updatedCount > 0) {
                        msg = updatedCount + '개의 콘텐츠를 업데이트했습니다';
                    } else {
                        msg = importedCount + '개의 콘텐츠를 성공적으로 불러왔습니다';
                    }
                    this.showToast(msg);

                } catch (error) {
                    console.error('배치 데이터 불러오기 오류:', error);
                    this.showToast('데이터 불러오기에 실패했습니다', 'error');
                }
            }

            async _addNewContent(content, contentIdMap) {
                const originalId = content.id;
                delete content.id;

                const uniqueTitle = await this.getUniqueTitle(content.title);
                content.title = uniqueTitle;
                content.imported_at = new Date();
                content.url_path = this.detectUrlPath();

                const transaction = this.db.transaction(['contents'], 'readwrite');
                const store = transaction.objectStore('contents');

                await new Promise((resolve, reject) => {
                    const request = store.add(content);
                    request.onsuccess = () => {
                        contentIdMap.set(originalId, request.result);
                    };
                    request.onerror = () => reject(request.error);
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            }

            combineImageData(chunks) {
                const validChunks = chunks.filter(chunk => chunk && typeof chunk === 'string' && chunk.trim());
                return validChunks.join('');
            }

            // ===== Toast =====
            showToast(message, type = 'info') {
                const existingToast = document.querySelector('.toast');
                if (existingToast) existingToast.remove();

                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;

                if (type === 'error') toast.classList.add('error');
                else if (type === 'info') toast.classList.add('info');

                document.body.appendChild(toast);

                setTimeout(() => { toast.classList.add('show'); }, 100);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
                }, 3000);
            }

            // ===== Confirm Dialog =====
            showConfirmDialog(title, message) {
                return new Promise((resolve) => {
                    const modal = document.createElement('div');
                    modal.className = 'confirm-modal';

                    modal.innerHTML =
                        '<div class="confirm-dialog">' +
                            '<div class="confirm-title">' + title + '</div>' +
                            '<div class="confirm-message">' + message + '</div>' +
                            '<div class="confirm-buttons">' +
                                '<button class="confirm-button cancel">취소</button>' +
                                '<button class="confirm-button confirm">확인</button>' +
                            '</div>' +
                        '</div>';

                    modal.querySelector('.cancel').addEventListener('click', () => { modal.remove(); resolve(false); });
                    modal.querySelector('.confirm').addEventListener('click', () => { modal.remove(); resolve(true); });
                    modal.addEventListener('click', (e) => { if (e.target === modal) { modal.remove(); resolve(false); } });

                    document.body.appendChild(modal);
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.app = new WordMemorizationApp();
        });
    </script>
</body>
</html>
